name: CI

on:
  push:
    branches-ignore: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: restaurant_user
          POSTGRES_PASSWORD: restaurant_password
          POSTGRES_DB: restaurant_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn db:generate
        env:
          DATABASE_URL: postgresql://restaurant_user:restaurant_password@localhost:5432/restaurant_bot_test

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://restaurant_user:restaurant_password@localhost:5432/restaurant_bot_test

      - name: Build
        run: yarn build

      # - name: Run tests
      #   run: yarn test
      #   env:
      #     DATABASE_URL: postgresql://restaurant_user:restaurant_password@localhost:5432/restaurant_bot_test
      #     JWT_SECRET: test-jwt-secret
      #     NODE_ENV: test