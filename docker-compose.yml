version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_bot_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
      POSTGRES_DB: restaurant_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev                       # uses the dev stage — has tsx + all devDeps
    container_name: restaurant_bot_api
    restart: unless-stopped
    ports:
      - "4050:4050"
    environment:
      DATABASE_URL: postgresql://restaurant_user:restaurant_password@postgres:5432/restaurant_bot?schema=public
      PORT: 4050
      NODE_ENV: development
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@restaurant.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin1234!}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src          # hot reload — changes reflect immediately
      - ./prisma:/app/prisma
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma db push &&
        yarn db:seed &&
        yarn dev
      "

volumes:
  postgres_data:
    driver: local
